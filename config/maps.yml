# ──────────────────────────────────────────────
# Mapbox Vector Tilesets (hosted on your account)
# Update these IDs after uploading to your Mapbox account
# ──────────────────────────────────────────────
tilesets:
  tract:
    url: "mapbox://fdgamaps.0rih3puc"
    sourceLayer: "tract_census_2020-cmzo8u"
  block:
    url: "mapbox://fdgamaps.3hcg2lso"
    sourceLayer: "block_census_2020_small-ai13v3"
  precinct:
    url: "mapbox://fdgamaps.97e7r27u"
    sourceLayer: "precinct_2020-cw9lzx"

# ──────────────────────────────────────────────
# District Plans
# Each plan generates 4 Mapbox layers: line, fill, hover, popup
# districtProp: the GeoJSON property used to identify districts
# ──────────────────────────────────────────────
districtPlans:
  # Enacted Maps for 2024 elections
  - id: congress_r1
    label: "Enacted US Congress, for 2024 elections"
    geojson: congress_enacted_24_2024update.geojson
    chamber: congress
    districtProp: district
    tooltipTitle: "Enacted Congressional Map"
    group: "Enacted Maps to be used for 2024 election"
    default: true

  - id: senate_r1
    label: "Enacted State Senate, for 2024 elections"
    geojson: senate_enacted_24_2024update.geojson
    chamber: senate
    districtProp: district
    tooltipTitle: "Enacted Senate Map"
    group: "Enacted Maps to be used for 2024 election"

  - id: house_r1
    label: "Enacted State House, for 2024 elections"
    geojson: house_enacted_24_2024update.geojson
    chamber: house
    districtProp: district
    tooltipTitle: "Enacted House Map"
    group: "Enacted Maps to be used for 2024 election"

  # Current Maps until 2024
  - id: congress_proposed_3
    label: "Current US Congress, 2021 - 2024"
    geojson: congress_enacted_2123_2024update.geojson
    chamber: congress
    districtProp: district
    tooltipTitle: "Previous Congressional Map (2021 - 2023)"
    group: "Current Maps until the 2024 election"

  - id: senate_p3
    label: "Current State Senate, 2021 - 2024"
    geojson: senate_enacted_2123_2024update.geojson
    chamber: senate
    districtProp: district
    tooltipTitle: "Previous State Senate Map (2021 - 2023)"
    group: "Current Maps until the 2024 election"

  - id: house_p3
    label: "Current State House, 2021 - 2024"
    geojson: house_enacted_2123_2024update.geojson
    chamber: house
    districtProp: district
    tooltipTitle: "Previous State House Map (2021 - 2023)"
    group: "Current Maps until the 2024 election"

  # Previous Maps
  - id: congress
    label: "US Congress, 2011-2021"
    geojson: congress12_census20.geojson
    chamber: congress
    districtProp: district
    tooltipTitle: "Previous Congressional Map (2011 - 2021)"
    group: "Previous Maps"

  - id: senate
    label: "State Senate, 2014-2021"
    geojson: senate14_census20.geojson
    chamber: senate
    districtProp: district
    tooltipTitle: "Previous State Senate Map (2014 - 2021)"
    group: "Previous Maps"

  - id: house
    label: "State House, 2015-2021"
    geojson: house15_census20.geojson
    chamber: house
    districtProp: district
    tooltipTitle: "Previous State House Map (2015 - 2021)"
    group: "Previous Maps"

  # Other Maps Proposed in 2021 and 2023
  - id: senate_r2
    label: "State Senate, GSDC, 2023"
    geojson: senate_remedy_2.geojson
    chamber: senate
    districtProp: district
    tooltipTitle: "GSDC Senate Remedy Map"
    group: "Other Maps Proposed in 2021 and 2023"

  - id: house_r2
    label: "State House, GHDC, 2023"
    geojson: house_remedy_2.geojson
    chamber: house
    districtProp: district
    tooltipTitle: "GHDC House Remedy Map"
    group: "Other Maps Proposed in 2021 and 2023"

  - id: congress_r2
    label: "US Congress, GHDC & GSDC, 2023"
    geojson: congress_remedy_2.geojson
    chamber: congress
    districtProp: district
    tooltipTitle: "GHDC & GSDC Congressional Remedy Map"
    group: "Other Maps Proposed in 2021 and 2023"

  - id: congress_proposed
    label: "US Congress, Senate Committee Chair, 2021"
    geojson: congress21_census20.geojson
    chamber: congress
    districtProp: district
    tooltipTitle: "Map proposed by Senate Committee Chair, 2021"
    group: "Other Maps Proposed in 2021 and 2023"

  - id: congress_proposed_2
    label: "US Congress, Democratic Caucuses, 2021"
