# ──────────────────────────────────────────────
# Demographic Overlays
# ──────────────────────────────────────────────
overlays:
  - id: streets
    label: "Streets Background Layer"
    group: null

  - id: bvap
    label: "Percent Black Voting Age Population"
    property: pct_bvp
    group: "2020 US Census Demographics"
    layers: [tract_bvap, block_bvap]
    colorStops:
      fill:
        - [0, "#f2f0f7"]
        - [0.249, "#aba8d0"]
        - [0.499, "#865ebc"]
        - [0.749, "#664296"]
        - [1.1, "#d4d5d5"]
      outline:
        - [0, "#f2f0f7"]
        - [0.249, "#aba8d0"]
        - [0.499, "#865ebc"]
        - [0.749, "#664296"]
        - [1.1, "#d4d5d5"]
    legend:
      title: "Percent Black Voting-Age Population (2020)"
      items:
        - { label: "0% to 25%", color: "#f2f0f7" }
        - { label: "25% to 50%", color: "#aba8d0" }
        - { label: "50% to 75%", color: "#865ebc" }
        - { label: "75% to 100%", color: "#664296" }

  - id: hvap
    label: "Percent Hispanic Voting Age Population"
    property: pct_hvp
    group: "2020 US Census Demographics"
    layers: [tract_hvap, block_hvap]
    colorStops:
      fill:
        - [0, "#feedde"]
        - [0.249, "#fdbe85"]
        - [0.499, "#e6550d"]
        - [0.749, "#a63603"]
        - [1.1, "#d4d5d5"]
      outline:
        - [0, "#feedde"]
        - [0.249, "#fdbe85"]
        - [0.499, "#e6550d"]
        - [0.749, "#a63603"]
        - [1.1, "#d4d5d5"]
    legend:
      title: "Percent Hispanic Voting-Age Population (2020)"
      items:
        - { label: "0% to 25%", color: "#feedde" }
        - { label: "25% to 50%", color: "#fdbe85" }
        - { label: "50% to 75%", color: "#e6550d" }
        - { label: "75% to 100%", color: "#a63603" }

  - id: avap
    label: "Percent Asian Voting Age Population"
    property: pct_avp
    group: "2020 US Census Demographics"
    layers: [tract_avap, block_avap]
    colorStops:
      fill:
        - [0, "#edf8e9"]
        - [0.249, "#bae4b3"]
        - [0.499, "#31a354"]
        - [0.749, "#006d2c"]
        - [1.1, "#d4d5d5"]
      outline:
        - [0, "#edf8e9"]
        - [0.249, "#bae4b3"]
        - [0.499, "#31a354"]
        - [0.749, "#006d2c"]
        - [1.1, "#d4d5d5"]
    legend:
      title: "Percent Asian Voting Age Population (2020)"
      items:
        - { label: "0% to 25%", color: "#edf8e9" }
        - { label: "25% to 50%", color: "#bae4b3" }
        - { label: "50% to 75%", color: "#31a354" }
        - { label: "75% to 100%", color: "#006d2c" }

  - id: bipocvap
    label: "Percent Minority Voting Age Population"
    property: pct_bp_
    group: "2020 US Census Demographics"
    layers: [tract_bipocvap, block_bipocvap]
    colorStops:
      fill:
        - [0, "#feebe2"]
        - [0.249, "#fcc0c4"]
        - [0.499, "#d64ba5"]
        - [0.749, "#91318f"]
        - [1.1, "#d4d5d5"]
      outline:
        - [0, "#feebe2"]
        - [0.249, "#fcc0c4"]
        - [0.499, "#d64ba5"]
        - [0.749, "#91318f"]
        - [1.1, "#d4d5d5"]
    legend:
      title: "Percent Minority Voting Age Population (2020)"
      items:
        - { label: "0% to 25%", color: "#feebe2" }
        - { label: "25% to 50%", color: "#fcc0c4" }
        - { label: "50% to 75%", color: "#d64ba5" }
        - { label: "75% to 100%", color: "#91318f" }

  - id: precinct_plean
    label: "Partisan Lean, 2018-2021"
    property: partisan
    group: "Election Results by precinct"
    layers: [precinct_plean]
    colorStops:
      fill:
        - [0, "#bc131e"]
        - [0.4, "#eb4956"]
        - [0.465, "#c36e9e"]
        - [0.5, "#7279db"]
        - [0.535, "#3c6ebf"]
        - [0.6, "#1f4bae"]
        - [1.1, "#d4d5d5"]
      outline:
        - [0, "#c23a43"]
        - [0.4, "#ed6d78"]
        - [0.465, "#c991b1"]
        - [0.5, "#979cde"]
        - [0.535, "#5a83c4"]
        - [0.6, "#3b61b8"]
        - [1.1, "#d4d5d5"]
    legend:
      title: "Partisan Lean, Percent Democrat (2018-2022)"
      items:
        - { label: "< 40%", color: "#c23a43" }
        - { label: "40% to 46.5%", color: "#ed6d78" }
        - { label: "46.5% to 50%", color: "#c991b1" }
        - { label: "50% to 53.5%", color: "#979cde" }
        - { label: "53.5% to 60%", color: "#5a83c4" }
        - { label: "> 60%", color: "#3b61b8" }

# ──────────────────────────────────────────────
# Boundary layers (cities, counties)
# ──────────────────────────────────────────────
boundaries:
  cities:
    geojson: places_2020data.geojson
    lineColor: "#0AB2BB"
    lineWidth: 1.5
    fillColor: "#0AB2BB"
    fillOpacity: 0.1
    fillMinZoom: 11
  counties:
    geojson: county.geojson
    lineColor: "#969696"
    lineWidth: 1
